<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approval Sheet — Seminar Hall Booking</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body style="background:#f2f0f7;">

<div class="no-print" style="max-width:800px; margin:20px auto; display:flex; justify-content:flex-end; gap:10px;">
  <button class="btn btn-primary" onclick="window.print()">Print / Save as PDF</button>
</div>

<div class="print-sheet" id="sheet">
  <p style="text-align:center; color:#888;">Loading...</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const bookingId = params.get("id");

async function render() {
  const sheetEl = document.getElementById("sheet");
  if (!bookingId) { sheetEl.innerHTML = "<p>No booking specified.</p>"; return; }

  const { data: b } = await supabaseClient.from("bookings").select("*").eq("id", bookingId).single();
  if (!b || b.status !== "approved") { sheetEl.innerHTML = "<p style='text-align:center;'>This booking is not yet approved, so no approval sheet is available.</p>"; return; }

  const { data: hall } = await supabaseClient.from("halls").select("*").eq("id", b.hall_id).single();
  const { data: slots } = await supabaseClient.from("booking_slots").select("*, periods(label)").eq("booking_id", bookingId);
  const { data: signoffs } = await supabaseClient.from("booking_signoffs").select("*").eq("booking_id", bookingId).order("sort_order");

  const byDate = {};
  (slots || []).forEach(s => (byDate[s.booking_date] = byDate[s.booking_date] || []).push(s));
  const dateLines = Object.keys(byDate).sort().map(d => {
    const periods = byDate[d].sort((a,b)=>a.period_id-b.period_id).map(s => `P${s.period_id} (${s.periods ? s.periods.label : ''})`).join(", ");
    return `${fmtDate(d)}: ${periods}`;
  }).join("<br>");

  const offices = (signoffs && signoffs.length) ? signoffs.map(s => s.office) :
    ["Staff Incharge","HoD","Principal","House Keeping","Electrical","AO","Director","PRO","System Manager"];

  sheetEl.innerHTML = `
    <h2>PARK Institutions</h2>
    <div class="sub">Seminar Hall Booking — Approval Sheet ${b.is_emergency ? '(Emergency / Altered Booking)' : ''}</div>
    <table class="info" style="width:100%; border-collapse:collapse; margin-top:10px;">
      <tr><td style="width:40%;"><strong>Function</strong></td><td>${b.function_name}</td></tr>
      <tr><td><strong>Department</strong></td><td>${b.department}</td></tr>
      <tr><td><strong>Hall</strong></td><td>${hall ? `${hall.name} (Capacity ${hall.capacity})` : "-"}</td></tr>
      <tr><td><strong>Chief Guest</strong></td><td>${b.chief_guest || "-"}</td></tr>
      <tr><td><strong>Date(s) & Period(s)</strong></td><td>${dateLines || "-"}</td></tr>
      <tr><td><strong>Students Attending</strong></td><td>${b.students_count}</td></tr>
      <tr><td><strong>Staff Incharge</strong></td><td>${b.staff_incharge_name} — ${b.staff_incharge_mobile}</td></tr>
      <tr><td><strong>Student Incharge</strong></td><td>${b.student_incharge_name || "-"} ${b.student_incharge_mobile ? "— " + b.student_incharge_mobile : ""}</td></tr>
      <tr><td><strong>Booking Staff Mobile</strong></td><td>${b.booking_staff_mobile}</td></tr>
      <tr><td><strong>Food Arrangement</strong></td><td>${b.food_arrangement}</td></tr>
      <tr><td><strong>Snacks Arrangement</strong></td><td>${b.snacks_arrangement}</td></tr>
      <tr><td><strong>Requested By</strong></td><td>${b.created_by_name}</td></tr>
      <tr><td><strong>Approved By (HoD)</strong></td><td>${b.hod_remarks ? b.hod_remarks : "Approved"}</td></tr>
    </table>

    <p style="margin-top:22px; font-size:12px; color:#555;">This booking is confirmed only once all signatures below are obtained.</p>

    <div class="sign-grid">
      ${offices.map(o => `<div class="sign-box">${o}</div>`).join("")}
    </div>
  `;
}
render();
</script>
</body>
</html>
