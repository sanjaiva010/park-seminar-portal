<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seminar Hall Booking System</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/pocketbase@0.21.3/dist/pocketbase.umd.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: '#101826',
          navy: { 50:'#eef1f7',100:'#dde3ef',200:'#b9c5db',300:'#8fa0c1',400:'#5c74a0',500:'#3b5482',600:'#2a3f66',700:'#1f3050',800:'#17233c',900:'#0f172a' },
          brass: { 50:'#fbf3e3',100:'#f5e3bd',200:'#eccd85',300:'#ddb04d',400:'#c8952f',500:'#b07d22',600:'#8f651b',700:'#6e4d15' },
          paper: '#f2f3f6'
        },
        fontFamily: {
          display: ['Fraunces','serif'],
          sans: ['Inter','sans-serif'],
          mono: ['JetBrains Mono','monospace']
        }
      }
    }
  }
</script>

<style>
  body { background: #f2f3f6; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #b9c5db; border-radius: 8px; }
  .seal {
    background: radial-gradient(circle at 30% 30%, #2a3f66, #101826);
  }
  .ring-seal { box-shadow: 0 0 0 3px #f2f3f6, 0 0 0 5px #c8952f; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.3); cursor: pointer; }

  @media print {
    body * { visibility: hidden; }
    #print-area, #print-area * { visibility: visible; }
    #print-area { position: absolute; left: 0; top: 0; width: 100%; }
    .no-print { display: none !important; }
    @page { size: A4; margin: 14mm; }
  }

  .badge-pending { background:#fef3c7; color:#92400e; }
  .badge-approved { background:#dcfce7; color:#166534; }
  .badge-rejected { background:#fee2e2; color:#991b1b; }
  .badge-cancelled { background:#e5e7eb; color:#374151; }

  .fade-in { animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(4px);} to { opacity:1; transform:none; } }
</style>
</head>
<body class="font-sans text-ink">

<div id="root"></div>

<script type="text/babel" data-presets="react,stage-3">
const { useState, useEffect, useCallback } = React;

/* =========================================================================
   CONSTANTS
   ========================================================================= */

const PERIODS = [
  { id: 1, label: 'Period 1', time: '9:00 – 9:50 AM' },
  { id: 2, label: 'Period 2', time: '9:50 – 10:40 AM' },
  { id: 3, label: 'Period 3', time: '10:40 – 11:30 AM' },
  { id: 4, label: 'Period 4', time: '11:40 – 12:30 PM' },
  { id: 5, label: 'Period 5', time: '1:30 – 2:20 PM' },
  { id: 6, label: 'Period 6', time: '2:20 – 3:10 PM' },
  { id: 7, label: 'Period 7', time: '3:20 – 4:10 PM' },
];

const DEFAULT_HALLS = [
  { name: 'Seminar Hall - 1 (TP)', code: 'SH1-TP', capacity: 200 },
  { name: 'Seminar Hall - 2 (TP)', code: 'SH2-TP', capacity: 150 },
  { name: 'Seminar Hall - 3 (TP)', code: 'SH3-TP', capacity: 100 },
  { name: 'New Seminar Hall (MB)', code: 'NSH-MB', capacity: 80 },
  { name: 'Auditorium', code: 'AUD', capacity: 800 },
];

const DEFAULT_DEPARTMENTS = [
  { name: 'General', is_general: true },
  { name: 'Computer Science & Engineering', is_general: false },
  { name: 'Electronics & Communication Engineering', is_general: false },
  { name: 'Electrical & Electronics Engineering', is_general: false },
  { name: 'Mechanical Engineering', is_general: false },
  { name: 'Civil Engineering', is_general: false },
  { name: 'Information Technology', is_general: false },
];

const SIGNATORIES = [
  'Staff Incharge', 'HoD', 'Principal', 'House Keeping',
  'Electrical', 'AO', 'Director', 'PRO', 'System Manager'
];

const ROLE_LABEL = { super_admin: 'Super Admin', hod: 'HoD', staff: 'Staff' };

/* =========================================================================
   POCKETBASE
   ========================================================================= */

let pb = null;
function getPB() {
  if (pb) return pb;
  const url = localStorage.getItem('shb_pb_url');
  if (!url) return null;
  pb = new PocketBase(url);
  pb.autoCancellation(false);
  return pb;
}

function collegeName() {
  return localStorage.getItem('shb_college_name') || 'College Seminar Hall Booking';
}

/* =========================================================================
   SMALL UI PRIMITIVES
   ========================================================================= */

function Badge({ status }) {
  const cls = { pending:'badge-pending', approved:'badge-approved', rejected:'badge-rejected', cancelled:'badge-cancelled' }[status] || 'badge-cancelled';
  return <span className={`px-2.5 py-1 rounded-full text-xs font-semibold uppercase tracking-wide ${cls}`}>{status}</span>;
}

function Field({ label, children, required, hint, className }) {
  return (
    <label className={`block mb-4 ${className||''}`}>
      <span className="block text-sm font-semibold text-navy-800 mb-1.5">
        {label}{required && <span className="text-brass-500 ml-0.5">*</span>}
      </span>
      {children}
      {hint && <span className="block text-xs text-navy-400 mt-1">{hint}</span>}
    </label>
  );
}

const inputCls = "w-full rounded-lg border border-navy-200 bg-white px-3.5 py-2.5 text-sm text-ink placeholder-navy-300 focus:outline-none focus:ring-2 focus:ring-brass-300 focus:border-brass-400 transition";

function Button({ children, variant='primary', className='', ...props }) {
  const variants = {
    primary: 'bg-navy-800 text-white hover:bg-navy-900',
    brass: 'bg-brass-400 text-navy-900 hover:bg-brass-500 font-semibold',
    ghost: 'bg-transparent text-navy-700 hover:bg-navy-100 border border-navy-200',
    danger: 'bg-red-600 text-white hover:bg-red-700',
    subtle: 'bg-navy-100 text-navy-700 hover:bg-navy-200',
  };
  return (
    <button {...props} className={`px-4 py-2.5 rounded-lg text-sm font-medium transition disabled:opacity-40 disabled:cursor-not-allowed ${variants[variant]} ${className}`}>
      {children}
    </button>
  );
}

function Card({ children, className='' }) {
  return <div className={`bg-white rounded-2xl border border-navy-100 shadow-sm ${className}`}>{children}</div>;
}

function Toast({ toast }) {
  if (!toast) return null;
  const colors = { success:'bg-emerald-600', error:'bg-red-600', info:'bg-navy-800' };
  return (
    <div className={`fixed bottom-6 right-6 z-50 ${colors[toast.type]} text-white px-5 py-3 rounded-xl shadow-lg fade-in text-sm font-medium`}>
      {toast.msg}
    </div>
  );
}

function Empty({ title, sub }) {
  return (
    <div className="text-center py-16 px-6">
      <div className="w-14 h-14 mx-auto rounded-full bg-navy-100 flex items-center justify-center mb-4">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3b5482" strokeWidth="1.7"><path d="M9 12h6M9 16h6M9 8h6M5 4h14v16l-4-3-3 3-3-3-4 3V4Z"/></svg>
      </div>
      <p className="font-display text-lg text-navy-800">{title}</p>
      {sub && <p className="text-sm text-navy-400 mt-1">{sub}</p>}
    </div>
  );
}

/* =========================================================================
   SETUP + LOGIN
   ========================================================================= */

function SetupScreen({ onDone }) {
  const [url, setUrl] = useState(localStorage.getItem('shb_pb_url') || '');
  const [name, setName] = useState(localStorage.getItem('shb_college_name') || '');
  const [err, setErr] = useState('');
  const [checking, setChecking] = useState(false);

  async function save() {
    setErr('');
    if (!url.trim()) { setErr('Enter your PocketHost / PocketBase URL.'); return; }
    setChecking(true);
    try {
      const test = new PocketBase(url.trim());
      await test.health.check();
      localStorage.setItem('shb_pb_url', url.trim().replace(/\/$/, ''));
      localStorage.setItem('shb_college_name', name.trim() || 'College Seminar Hall Booking');
      pb = null;
      onDone();
    } catch (e) {
      setErr('Could not reach that URL. Check it and try again.');
    } finally { setChecking(false); }
  }

  return (
    <div className="min-h-screen flex items-center justify-center px-4">
      <Card className="max-w-md w-full p-8">
        <div className="w-11 h-11 rounded-full seal ring-seal mb-5"></div>
        <h1 className="font-display text-2xl font-semibold text-navy-900">One-time setup</h1>
        <p className="text-sm text-navy-400 mt-1 mb-6">Connect this app to your PocketHost backend.</p>
        <Field label="Institution name" hint="Shown on dashboards and the printed approval form.">
          <input className={inputCls} value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Sri XYZ College of Engineering" />
        </Field>
        <Field label="PocketBase / PocketHost URL" required hint="e.g. https://your-app.pockethost.io">
          <input className={inputCls} value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://your-app.pockethost.io" />
        </Field>
        {err && <p className="text-sm text-red-600 mb-3">{err}</p>}
        <Button variant="brass" className="w-full" onClick={save} disabled={checking}>
          {checking ? 'Checking…' : 'Connect'}
        </Button>
        <p className="text-xs text-navy-400 mt-4">First time? See the README for the collections you need to create in PocketBase before connecting.</p>
      </Card>
    </div>
  );
}

function LoginScreen() {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  async function submit(e) {
    e.preventDefault();
    setErr(''); setLoading(true);
    try {
      const client = getPB();
      await client.collection('users').authWithPassword(email.trim(), password);
    } catch (e2) {
      setErr('Login failed. Check your email and password.');
    } finally { setLoading(false); }
  }

  return (
    <div className="min-h-screen flex items-center justify-center px-4">
      <div className="max-w-sm w-full">
        <div className="flex flex-col items-center mb-8">
          <div className="w-14 h-14 rounded-full seal ring-seal mb-4"></div>
          <h1 className="font-display text-2xl font-semibold text-navy-900 text-center">{collegeName()}</h1>
          <p className="text-sm text-navy-400 mt-1">Seminar Hall Booking System</p>
        </div>
        <Card className="p-8">
          <form onSubmit={submit}>
            <Field label="Email" required>
              <input className={inputCls} type="email" value={email} onChange={e=>setEmail(e.target.value)} required />
            </Field>
            <Field label="Password" required>
              <input className={inputCls} type="password" value={password} onChange={e=>setPassword(e.target.value)} required />
            </Field>
            {err && <p className="text-sm text-red-600 mb-3">{err}</p>}
            <Button variant="brass" className="w-full mt-2" disabled={loading}>{loading ? 'Signing in…' : 'Sign in'}</Button>
          </form>
        </Card>
        <p className="text-xs text-center text-navy-400 mt-5">Don't have an account? Ask your Super Admin to create one for you.</p>
        <button className="text-xs text-center text-navy-300 mt-3 w-full hover:text-navy-500" onClick={()=>{localStorage.removeItem('shb_pb_url'); location.reload();}}>Change backend URL</button>
      </div>
    </div>
  );
}

/* =========================================================================
   APP DATA HOOK
   ========================================================================= */

function useAppData(user) {
  const [halls, setHalls] = useState([]);
  const [departments, setDepartments] = useState([]);
  const [loading, setLoading] = useState(true);

  const reload = useCallback(async () => {
    const client = getPB();
    setLoading(true);
    try {
      const [h, d] = await Promise.all([
        client.collection('halls').getFullList({ sort: 'capacity' }),
        client.collection('departments').getFullList({ sort: 'name' }),
      ]);
      setHalls(h); setDepartments(d);
    } catch (e) { /* collections may not exist yet */ }
    setLoading(false);
  }, []);

  useEffect(() => { if (user) reload(); }, [user, reload]);

  return { halls, departments, loading, reload };
}

/* =========================================================================
   BOOKING FORM
   ========================================================================= */

function overlaps(a, b) {
  return (a||[]).some(x => (b||[]).includes(x));
}

function BookingForm({ user, halls, departments, onCreated, alterFrom, onCancelAlter }) {
  const client = getPB();
  const isAlteration = !!alterFrom;

  const [department, setDepartment] = useState(alterFrom?.department || '');
  const [functionName, setFunctionName] = useState(alterFrom?.function_name || '');
  const [chiefGuest, setChiefGuest] = useState(alterFrom?.chief_guest || '');
  const [staffMobile, setStaffMobile] = useState(alterFrom?.staff_mobile || user.mobile || '');
  const [hall, setHall] = useState(alterFrom?.hall || '');
  const [students, setStudents] = useState(alterFrom?.students_count || '');
  const [staffInName, setStaffInName] = useState(alterFrom?.staff_incharge_name || '');
  const [staffInMobile, setStaffInMobile] = useState(alterFrom?.staff_incharge_mobile || '');
  const [studInName, setStudInName] = useState(alterFrom?.student_incharge_name || '');
  const [studInMobile, setStudInMobile] = useState(alterFrom?.student_incharge_mobile || '');
  const [mode, setMode] = useState(alterFrom?.booking_mode || 'single');
  const [dates, setDates] = useState(alterFrom?.dates || []);
  const [dateInput, setDateInput] = useState('');
  const [periods, setPeriods] = useState(alterFrom?.periods || []);
  const [food, setFood] = useState(alterFrom?.food_arrangement || false);
  const [foodDetails, setFoodDetails] = useState(alterFrom?.food_details || '');
  const [snacks, setSnacks] = useState(alterFrom?.snacks_arrangement || false);
  const [snacksDetails, setSnacksDetails] = useState(alterFrom?.snacks_details || '');
  const [alterReason, setAlterReason] = useState('');
  const [conflictWarning, setConflictWarning] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [err, setErr] = useState('');

  const selectedHall = halls.find(h => h.id === hall);

  function addDate() {
    if (!dateInput) return;
    if (mode === 'single') { setDates([dateInput]); setDateInput(''); return; }
    if (!dates.includes(dateInput)) setDates([...dates, dateInput].sort());
    setDateInput('');
  }
  function removeDate(d) { setDates(dates.filter(x => x !== d)); }
  function togglePeriod(id) { setPeriods(periods.includes(id) ? periods.filter(p=>p!==id) : [...periods, id].sort((a,b)=>a-b)); }

  useEffect(() => {
    let cancelled = false;
    async function check() {
      setConflictWarning('');
      if (!hall || dates.length === 0 || periods.length === 0) return;
      try {
        const existing = await client.collection('bookings').getFullList({
          filter: `hall = "${hall}" && status = "approved"`,
        });
        if (cancelled) return;
        const clash = existing.find(b => b.id !== (alterFrom?.id) && overlaps(b.dates, dates) && overlaps(b.periods, periods));
        if (clash) setConflictWarning(`This hall is already approved for an overlapping date/period ("${clash.function_name}"). Choose a different slot or hall.`);
      } catch(e){}
    }
    check();
    return () => { cancelled = true; };
  }, [hall, JSON.stringify(dates), JSON.stringify(periods)]);

  async function submit(e) {
    e.preventDefault();
    setErr('');
    if (!department || !functionName || !staffMobile || !hall || !students || !staffInName || !staffInMobile || !studInName || !studInMobile) {
      setErr('Please fill in all required fields.'); return;
    }
    if (dates.length === 0) { setErr('Add at least one date.'); return; }
    if (periods.length === 0) { setErr('Select at least one period.'); return; }
    if (conflictWarning) { setErr('Resolve the scheduling conflict before submitting.'); return; }
    if (isAlteration && !alterReason.trim()) { setErr('Please state the reason for this emergency alteration.'); return; }

    setSubmitting(true);
    const payload = {
      department, function_name: functionName, chief_guest: chiefGuest, staff_mobile: staffMobile,
      hall, booking_mode: mode, dates, periods, students_count: Number(students),
      staff_incharge_name: staffInName, staff_incharge_mobile: staffInMobile,
      student_incharge_name: studInName, student_incharge_mobile: studInMobile,
      food_arrangement: food, food_details: food ? foodDetails : '',
      snacks_arrangement: snacks, snacks_details: snacks ? snacksDetails : '',
      status: 'pending', hod_remarks: '', created_by: user.id,
    };
    try {
      if (isAlteration) {
        payload.is_emergency = true;
        payload.alteration_reason = alterReason;
        payload.previous_snapshot = JSON.stringify({
          function_name: alterFrom.function_name, hall: alterFrom.hall, dates: alterFrom.dates, periods: alterFrom.periods,
        });
        await client.collection('bookings').update(alterFrom.id, payload);
      } else {
        await client.collection('bookings').create(payload);
      }
      onCreated();
    } catch (e2) {
      setErr('Could not save the booking. ' + (e2?.data?.message || ''));
    } finally { setSubmitting(false); }
  }

  return (
    <Card className="p-6 sm:p-8 max-w-3xl">
      {isAlteration && (
        <div className="mb-6 rounded-lg bg-brass-50 border border-brass-200 px-4 py-3 text-sm text-brass-700 flex items-start justify-between gap-3">
          <span>⚡ Emergency alteration mode — changes will be re-sent to your HoD for approval.</span>
          <button className="text-xs underline shrink-0" onClick={onCancelAlter}>Cancel</button>
        </div>
      )}
      <h2 className="font-display text-xl font-semibold text-navy-900 mb-1">{isAlteration ? 'Alter Booking' : 'New Hall Booking'}</h2>
      <p className="text-sm text-navy-400 mb-6">All fields marked * are required.</p>

      <form onSubmit={submit}>
        <div className="grid sm:grid-cols-2 gap-x-6">
          <Field label="Department" required>
            <select className={inputCls} value={department} onChange={e=>setDepartment(e.target.value)}>
              <option value="">Select department</option>
              {departments.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
            </select>
          </Field>
          <Field label="Hall" required>
            <select className={inputCls} value={hall} onChange={e=>setHall(e.target.value)}>
              <option value="">Select hall</option>
              {halls.map(h => <option key={h.id} value={h.id}>{h.name} — {h.capacity} seats</option>)}
            </select>
          </Field>
        </div>

        <Field label="Function / Event Name" required>
          <input className={inputCls} value={functionName} onChange={e=>setFunctionName(e.target.value)} placeholder="e.g. Guest Lecture on AI Ethics" />
        </Field>

        <div className="grid sm:grid-cols-2 gap-x-6">
          <Field label="Chief Guest" hint="Leave blank if not applicable">
            <input className={inputCls} value={chiefGuest} onChange={e=>setChiefGuest(e.target.value)} />
          </Field>
          <Field label="Booking Staff Mobile Number" required>
            <input className={inputCls} value={staffMobile} onChange={e=>setStaffMobile(e.target.value)} inputMode="tel" placeholder="10-digit number" />
          </Field>
        </div>

        <Field label="Expected Students Attending" required hint={selectedHall ? `Hall capacity: ${selectedHall.capacity}` : ''}>
          <input className={inputCls} type="number" min="1" value={students} onChange={e=>setStudents(e.target.value)} />
          {selectedHall && Number(students) > selectedHall.capacity && (
            <p className="text-xs text-red-600 mt-1">This exceeds the hall's capacity of {selectedHall.capacity}.</p>
          )}
        </Field>

        <div className="grid sm:grid-cols-2 gap-x-6">
          <Field label="Staff Incharge Name" required>
            <input className={inputCls} value={staffInName} onChange={e=>setStaffInName(e.target.value)} />
          </Field>
          <Field label="Staff Incharge Mobile" required>
            <input className={inputCls} value={staffInMobile} onChange={e=>setStaffInMobile(e.target.value)} inputMode="tel" />
          </Field>
          <Field label="Student Incharge Name" required>
            <input className={inputCls} value={studInName} onChange={e=>setStudInName(e.target.value)} />
          </Field>
          <Field label="Student Incharge Mobile" required>
            <input className={inputCls} value={studInMobile} onChange={e=>setStudInMobile(e.target.value)} inputMode="tel" />
          </Field>
        </div>

        <div className="h-px bg-navy-100 my-6"></div>

        <Field label="Booking duration" required>
          <div className="flex gap-3 mb-3">
            {['single','multiple'].map(m => (
              <button type="button" key={m} onClick={()=>{setMode(m); setDates([]);}}
                className={`px-4 py-2 rounded-lg text-sm font-medium border transition ${mode===m ? 'bg-navy-800 text-white border-navy-800' : 'bg-white text-navy-600 border-navy-200 hover:bg-navy-50'}`}>
                {m === 'single' ? 'Single Day' : 'Multiple Days'}
              </button>
            ))}
          </div>
          <div className="flex gap-2">
            <input className={inputCls} type="date" value={dateInput} onChange={e=>setDateInput(e.target.value)} />
            <Button type="button" variant="subtle" onClick={addDate}>{mode==='single' ? 'Set' : 'Add date'}</Button>
          </div>
          {dates.length > 0 && (
            <div className="flex flex-wrap gap-2 mt-3">
              {dates.map(d => (
                <span key={d} className="inline-flex items-center gap-2 bg-navy-100 text-navy-800 text-xs font-medium px-3 py-1.5 rounded-full">
                  {d}
                  <button type="button" onClick={()=>removeDate(d)} className="text-navy-400 hover:text-red-600">✕</button>
                </span>
              ))}
            </div>
          )}
        </Field>

        <Field label="Periods required" required hint="Selected periods apply to every date chosen above.">
          <div className="grid sm:grid-cols-2 gap-2">
            {PERIODS.map(p => (
              <label key={p.id} className={`flex items-center gap-3 px-3.5 py-2.5 rounded-lg border cursor-pointer transition text-sm ${periods.includes(p.id) ? 'bg-brass-50 border-brass-300' : 'bg-white border-navy-200 hover:bg-navy-50'}`}>
                <input type="checkbox" className="accent-brass-500 w-4 h-4" checked={periods.includes(p.id)} onChange={()=>togglePeriod(p.id)} />
                <span className="font-medium text-navy-800">{p.label}</span>
                <span className="text-navy-400 text-xs ml-auto">{p.time}</span>
              </label>
            ))}
          </div>
        </Field>

        {conflictWarning && (
          <div className="rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700 mb-4">{conflictWarning}</div>
        )}

        <div className="h-px bg-navy-100 my-6"></div>

        <div className="grid sm:grid-cols-2 gap-6">
          <div>
            <label className="flex items-center gap-2 mb-2">
              <input type="checkbox" className="accent-brass-500 w-4 h-4" checked={food} onChange={e=>setFood(e.target.checked)} />
              <span className="text-sm font-semibold text-navy-800">Food arrangement needed</span>
            </label>
            {food && <textarea className={inputCls} rows="3" placeholder="Menu, count, timing…" value={foodDetails} onChange={e=>setFoodDetails(e.target.value)} />}
          </div>
          <div>
            <label className="flex items-center gap-2 mb-2">
              <input type="checkbox" className="accent-brass-500 w-4 h-4" checked={snacks} onChange={e=>setSnacks(e.target.checked)} />

            </label>
            {snacks && <textarea className={inputCls} rows="3" placeholder="Menu, count, timing…" value={snacksDetails} onChange={e=>setSnacksDetails(e.target.value)} />}
          </div>
        </div>

        {isAlteration && (

        <Button variant="brass" className="mt-4" disabled={submitting}>
          {submitting ? 'Submitting…' : isAlteration ? 'Resubmit for HoD approval' : 'Submit for HoD approval'}
        </Button>
      </form>
    </Card>
  );
}

/* =========================================================================
   HOD DASHBOARD (also used by Super Admin for "General" department queue)
   ========================================================================= */

function HodDashboard({ user, halls, departments }) {
  const client = getPB();
  const [tab, setTab] = useState('pending');
  const [bookings, setBookings] = useState([]);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [remarksDraft, setRemarksDraft] = useState({});

  const isSuperScope = user.role === 'super_admin';

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const filter = isSuperScope
        ? `department.is_general = true`
        : `department = "${user.department}"`;
      const list = await client.collection('bookings').getFullList({ filter, sort: '-created', expand: 'created_by' });
      setBookings(list);
    } catch(e){}
    setLoading(false);
  }, [user.department, isSuperScope]);

  useEffect(() => { load(); }, [load]);

  function notify(msg, type='success') { setToast({msg,type}); setTimeout(()=>setToast(null), 3000); }

  async function act(b, status) {
    try {
      await client.collection('bookings').update(b.id, {
        status, hod_remarks: remarksDraft[b.id] || '', is_emergency: status==='approved' ? false : b.is_emergency,
      });
      notify(status === 'approved' ? 'Booking approved.' : 'Booking rejected.');
      load();
    } catch(e) { notify('Action failed.', 'error'); }
  }

  const pending = bookings.filter(b => b.status === 'pending');
  const history = bookings.filter(b => b.status !== 'pending');

  return (
    <div>
      <Toast toast={toast} />
      <div className="flex gap-2 mb-6 border-b border-navy-100">
        {[['pending', `Pending Approvals (${pending.length})`], ['history','History']].map(([k,l]) => (
          <button key={k} onClick={()=>setTab(k)} className={`px-4 py-2.5 text-sm font-semibold border-b-2 -mb-px transition ${tab===k ? 'border-brass-400 text-navy-900' : 'border-transparent text-navy-400 hover:text-navy-600'}`}>{l}</button>
        ))}
      </div>

      {loading ? <p className="text-navy-400 text-sm">Loading…</p> : (
        <div className="space-y-4 max-w-3xl">
          {tab === 'pending' && (pending.length === 0 ? <Empty title="Nothing pending" sub="You're all caught up." /> :
            pending.map(b => (
              <Card key={b.id} className="p-5">
                <div className="flex items-center gap-2 flex-wrap mb-1.5">
                  <Badge status={b.status} />
                  {b.is_emergency && <span className="text-xs font-bold text-brass-600">⚡ Emergency alteration</span>}
                </div>
                <h3 className="font-display text-lg font-semibold text-navy-900">{b.function_name}</h3>
                <p className="text-sm text-navy-500 mt-0.5">{departments.find(d=>d.id===b.department)?.name} · {halls.find(h=>h.id===b.hall)?.name}</p>
                <p className="text-xs text-navy-400 mt-1">{(b.dates||[]).join(', ')} · {(b.periods||[]).map(id=>PERIODS.find(p=>p.id===id)?.label).join(', ')}</p>
                <p className="text-xs text-navy-500 mt-2">Requested by: {b.expand?.created_by?.name || b.expand?.created_by?.email || '—'} · Students: {b.students_count} · Chief guest: {b.chief_guest || '—'}</p>
                {b.alteration_reason && <p className="text-xs text-brass-700 mt-2 bg-brass-50 border border-brass-200 rounded-lg p-2">Alteration reason: {b.alteration_reason}</p>}
                <textarea className={`${inputCls} mt-3`} rows="2" placeholder="Remarks (optional)" value={remarksDraft[b.id]||''} onChange={e=>setRemarksDraft({...remarksDraft, [b.id]: e.target.value})} />
                <div className="flex gap-2 mt-3">
                  <Button variant="brass" onClick={()=>act(b,'approved')}>Approve</Button>
                  <Button variant="danger" onClick={()=>act(b,'rejected')}>Reject</Button>
                </div>
              </Card>
            ))
          )}
          {tab === 'history' && (history.length === 0 ? <Empty title="No history yet" /> :
            history.map(b => <BookingCard key={b.id} b={b} halls={halls} departments={departments} />)
          )}
        </div>
      )}
    </div>
  );
}

function HallsTab({ halls, reload }) {

  const [name, setName] = useState(''); const [code, setCode] = useState(''); const [cap, setCap] = useState('');

function UsersTab({ departments }) {
  const client = getPB();
  const [users, setUsers] = useState([]);

  const [role, setRole] = useState('staff'); const [dept, setDept] = useState(''); const [mobile, setMobile] = useState('');
  const [busy, setBusy] = useState(false); const [err, setErr] = useState('');

  const load = useCallback(async () => {
    try { const list = await client.collection('users').getFullList({ sort: 'name' }); setUsers(list); } catch(e){}
  }, []);
  useEffect(()=>{ load(); }, [load]);

  async function add() {
    setErr('');

    setBusy(true);
    try {
      await client.collection('users').create({
        name, email, password, passwordConfirm: password, role, department: role==='super_admin' ? null : dept, mobile,
      });
      setName(''); setEmail(''); setPassword(''); setMobile(''); setDept('');
      load();
    } catch(e2) { setErr('Could not create user. ' + (e2?.data?.message || 'Check the create rule on the users collection.')); }
    finally { setBusy(false); }
  }

  return (
    <div className="max-w-2xl">

  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState('');

    setBusy(true); setMsg('');
    try {

  return (
    <Card className="p-6 max-w-lg">

      {tab === 'halls' && <HallsTab halls={halls} reload={reload} />}
      {tab === 'departments' && <DepartmentsTab departments={departments} reload={reload} />}
      {tab === 'users' && <UsersTab departments={departments} />}
      {tab === 'setup' && <SeedTab halls={halls} departments={departments} reload={reload} />}
    </div>
  );
}

/* =========================================================================
   SHELL
   ========================================================================= */

function DashboardShell({ user, onLogout, children }) {
  return (
    <div className="min-h-screen">
      <header className="bg-navy-900 text-white">
        <div className="max-w-6xl mx-auto px-5 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-full seal ring-seal shrink-0"></div>
            <div>
              <p className="font-display font-semibold leading-tight">{collegeName()}</p>
              <p className="text-xs text-navy-300">Seminar Hall Booking System</p>
            </div>
          </div>
          <div className="flex items-center gap-4">
            <div className="text-right hidden sm:block">
              <p className="text-sm font-medium">{user.name || user.email}</p>
              <p className="text-xs text-brass-300">{ROLE_LABEL[user.role] || user.role}</p>
            </div>
            <button onClick={onLogout} className="text-xs bg-navy-800 hover:bg-navy-700 px-3 py-2 rounded-lg transition">Sign out</button>
          </div>
        </div>
      </header>
      <main className="max-w-6xl mx-auto px-5 py-8">{children}</main>
    </div>
  );
}

/* =========================================================================
   ROOT APP
   ========================================================================= */

function App() {
  const [hasBackend, setHasBackend] = useState(!!localStorage.getItem('shb_pb_url'));
  const [user, setUser] = useState(null);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    if (!hasBackend) { setReady(true); return; }
    const client = getPB();
    setUser(client.authStore.isValid ? client.authStore.model : null);
    setReady(true);
    const unsub = client.authStore.onChange(() => {
      setUser(client.authStore.isValid ? client.authStore.model : null);
    });
    return unsub;
  }, [hasBackend]);

  const { halls, departments, loading, reload } = useAppData(user);

  if (!ready) return null;
  if (!hasBackend) return <SetupScreen onDone={()=>setHasBackend(true)} />;
  if (!user) return <LoginScreen />;

  function logout() { getPB().authStore.clear(); setUser(null); }

  return (
    <DashboardShell user={user} onLogout={logout}>
      {loading ? <p className="text-navy-400 text-sm">Loading halls & departments…</p> : (
        user.role === 'staff' ? <StaffDashboard user={user} halls={halls} departments={departments} /> :
        user.role === 'hod' ? <HodDashboard user={user} halls={halls} departments={departments} /> :
        user.role === 'super_admin' ? <SuperAdminDashboard user={user} halls={halls} departments={departments} reload={reload} /> :
        <Empty title="No dashboard configured for this role" sub={`Role: ${user.role}`} />
      )}
    </DashboardShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
